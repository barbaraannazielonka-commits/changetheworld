<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Change the World, One Game at a Time — Nannestad vgs</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Syne:wght@700;800&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}

/* ── MODES ── */
body.light{
  --bg:#ffffff;--bg2:#f7f7f6;--bg3:#efefed;
  --txt:#111;--txt2:#555;--txt3:#999;
  --bdr:rgba(0,0,0,.1);--bdr2:rgba(0,0,0,.2);
  --gold:#b45309;--gold-bg:#fef3c7;--gold-bdr:#fde68a;
  --green:#15803d;--green-bg:#dcfce7;--green-bdr:#86efac;
  --blue:#1d4ed8;--blue-bg:#dbeafe;--blue-bdr:#93c5fd;
  --teal-bg:#ccfbf1;--pur-bg:#ede9fe;--red-bg:#fee2e2;
  --nav-bg:#ffffff;--top-bg:#f7f7f6;
  --card:#ffffff;--card2:#f7f7f6;
}
body.dark{
  --bg:#0d1117;--bg2:#161b22;--bg3:#21262d;
  --txt:#e6edf3;--txt2:#8b949e;--txt3:#6e7681;
  --bdr:rgba(255,255,255,.1);--bdr2:rgba(255,255,255,.2);
  --gold:#f59e0b;--gold-bg:rgba(245,158,11,.15);--gold-bdr:rgba(245,158,11,.3);
  --green:#4ade80;--green-bg:rgba(74,222,128,.1);--green-bdr:rgba(74,222,128,.3);
  --blue:#60a5fa;--blue-bg:rgba(96,165,250,.1);--blue-bdr:rgba(96,165,250,.3);
  --teal-bg:rgba(45,212,191,.1);--pur-bg:rgba(167,139,250,.1);--red-bg:rgba(248,113,113,.1);
  --nav-bg:#161b22;--top-bg:#0d1117;
  --card:#161b22;--card2:#21262d;
}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--txt);transition:background .2s,color .2s}

/* ── TOPBAR ── */
.topbar{position:sticky;top:0;z-index:200;display:flex;align-items:center;
  justify-content:space-between;padding:.5rem 1.2rem;
  background:var(--top-bg);border-bottom:1px solid var(--bdr);backdrop-filter:blur(10px)}
.brand{font-size:11px;font-weight:500;color:var(--txt3);letter-spacing:.04em}
.topright{display:flex;gap:5px;align-items:center}
.lb,.mb{background:transparent;border:1px solid var(--bdr2);color:var(--txt2);
  font-size:11px;font-weight:600;padding:3px 9px;border-radius:5px;cursor:pointer;transition:all .15s}
.lb:hover,.mb:hover{background:var(--bg3);color:var(--txt)}
.lb.on{background:var(--gold-bg);border-color:var(--gold-bdr);color:var(--gold)}
.mb{font-size:14px;padding:2px 7px}

/* ── SUBNAV ── */
.nav{position:sticky;top:39px;z-index:190;background:var(--nav-bg);
  border-bottom:1px solid var(--bdr);display:flex;gap:2px;
  padding:.3rem .8rem;overflow-x:auto;white-space:nowrap;scrollbar-width:none}
.nav::-webkit-scrollbar{display:none}
.sn{background:transparent;border:none;font-size:11px;font-weight:600;
  color:var(--txt2);padding:4px 9px;border-radius:5px;cursor:pointer;transition:all .15s}
.sn:hover{background:var(--bg3);color:var(--txt)}
.sn.on{background:var(--green-bg);color:var(--green)}

/* ── PAGES ── */
.page{display:none;padding:1.6rem 1.2rem 3rem;min-height:300px}
.page.on{display:block}

/* ── TYPOGRAPHY ── */
.lbl{font-size:12px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;
  color:var(--txt3);margin-bottom:.5rem}
h2{font-family:'Syne',sans-serif;font-size:clamp(22px,4vw,32px);font-weight:800;
  color:var(--txt);line-height:1.15;margin-bottom:1rem}
.intro{font-size:16px;color:var(--txt2);line-height:1.75;max-width:62ch;margin-bottom:1.6rem}
.div{height:1px;background:var(--bdr);margin:1.5rem 0}

/* ── HERO ── */
.hero-h{font-family:'Syne',sans-serif;font-size:clamp(32px,8vw,60px);font-weight:800;
  line-height:.95;color:var(--txt);margin-bottom:.7rem}
.hero-h span{color:var(--gold)}
.hero-s{font-size:17px;color:var(--txt2);margin-bottom:1.3rem;max-width:54ch;line-height:1.65}
.pills{display:flex;flex-wrap:wrap;gap:.5rem;margin-bottom:1.5rem}
.pill{background:var(--bg2);border:1px solid var(--bdr);border-radius:6px;
  padding:6px 13px;font-size:14px;color:var(--txt2)}
.pill strong{color:var(--gold);font-family:'Syne',sans-serif;font-size:17px;display:block}

/* ── GRIDS ── */
.g2{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:12px}
.g3{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:12px}
.g2x{display:grid;grid-template-columns:1fr 1fr;gap:14px}
@media(max-width:480px){.g2x{grid-template-columns:1fr}}

/* ── CARDS ── */
.card{background:var(--card);border:1px solid var(--bdr);border-radius:10px;
  padding:1.2rem;transition:border-color .15s}
.card:hover{border-color:var(--bdr2)}
.ci{font-size:22px;margin-bottom:.55rem}
.card h4{font-family:'Syne',sans-serif;font-size:15px;font-weight:700;color:var(--gold);margin-bottom:.4rem}
.card p{font-size:14px;color:var(--txt2);line-height:1.6}

/* ── GAME TYPE CARDS ── */
.gtcard{border-radius:10px;padding:1.4rem;border:1px solid var(--bdr)}
.gtcard.tc{background:var(--teal-bg)}
.gtcard.pc{background:var(--pur-bg)}
.gtcard.bc{background:var(--blue-bg)}
.gti{font-size:26px;margin-bottom:.6rem}
.gtcard h3{font-family:'Syne',sans-serif;font-size:17px;font-weight:700;color:var(--txt);margin-bottom:.5rem}
.gtcard p{font-size:14px;color:var(--txt2);line-height:1.6}
.eg{margin-top:.7rem;font-size:13px;color:var(--txt3);font-style:italic;
  border-top:1px solid var(--bdr);padding-top:.6rem}
.eg a{color:var(--blue);text-decoration:none;font-style:normal;font-weight:500}
.eg a:hover{text-decoration:underline}

/* ── THEME BOXES ── */
.thbox{border-radius:10px;padding:1.4rem;border:1px solid var(--bdr)}
.thbox.sdg{background:var(--green-bg)}
.thbox.hls{background:var(--pur-bg)}
.thbox h3{font-family:'Syne',sans-serif;font-size:15px;font-weight:700;color:var(--txt);margin-bottom:.8rem}
.thbox ul{list-style:none}
.thbox li{font-size:14px;color:var(--txt2);padding:.3rem 0 .3rem .85rem;position:relative}
.thbox li::before{content:'·';position:absolute;left:0;color:var(--gold);font-weight:700}

/* ── TIMELINE ── */
.tl{display:flex;flex-direction:column}
.tlr{display:grid;grid-template-columns:100px 1px 1fr;gap:0 14px;align-items:stretch}
.tld{text-align:right;padding:1rem 0;font-family:'Syne',sans-serif;font-size:13px;font-weight:700;color:var(--gold)}
.tll{display:flex;flex-direction:column;align-items:center}
.dot{width:12px;height:12px;background:var(--gold);border-radius:50%;flex-shrink:0;margin-top:1.1rem}
.conn{flex:1;width:1px;background:var(--bdr)}
.tlb{padding:1rem 0 1rem .4rem;border-bottom:1px solid var(--bdr)}
.tlr:last-child .tlb{border-bottom:none}
.tlb h4{font-family:'Syne',sans-serif;font-size:15px;font-weight:700;color:var(--txt);margin-bottom:.3rem}
.tlb p{font-size:14px;color:var(--txt2);line-height:1.6}
.tags{display:flex;flex-wrap:wrap;gap:5px;margin-top:.5rem}
.tag{font-size:12px;background:var(--gold-bg);border:1px solid var(--gold-bdr);
  color:var(--gold);padding:3px 9px;border-radius:4px;font-weight:600}

/* ── ROLE CARDS ── */
.rcard{background:var(--card);border:1px solid var(--bdr);border-radius:10px;overflow:hidden}
.rhd{padding:.75rem 1.1rem;display:flex;align-items:center;gap:.6rem;
  background:var(--bg2);border-bottom:1px solid var(--bdr)}
.rhd h4{font-family:'Syne',sans-serif;font-size:15px;font-weight:700;color:var(--txt)}
.rb{list-style:none;padding:.6rem 1.1rem}
.rb li{font-size:14px;color:var(--txt2);padding:.2rem 0 .2rem .7rem;position:relative}
.rb li::before{content:'—';position:absolute;left:0;font-size:11px;top:.35rem;color:var(--txt3)}

/* ── TOOL CARDS ── */
.tcard{background:var(--card);border:1px solid var(--bdr);border-radius:10px;padding:1rem 1.1rem}
.tcat{font-family:'Syne',sans-serif;font-size:14px;font-weight:700;color:var(--gold);margin-bottom:.45rem}
.tlinks{font-size:14px;line-height:2}
.tlinks a{color:var(--blue);text-decoration:none}
.tlinks a:hover{text-decoration:underline}
.tdesc{font-size:13px;color:var(--txt3);margin-top:.25rem}

/* ── QUICK LINKS ── */
.qlg{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:10px;margin-top:1.4rem}
.qlc{display:flex;flex-direction:column;align-items:center;gap:5px;
  padding:1rem .6rem;border-radius:10px;background:var(--card);
  border:1px solid var(--bdr);text-decoration:none;color:var(--txt);
  text-align:center;transition:all .15s}
.qlc:hover{background:var(--bg3);border-color:var(--bdr2);transform:translateY(-2px)}
.qi{font-size:24px}.qn{font-family:'Syne',sans-serif;font-size:13px;font-weight:700}
.qd{font-size:12px;color:var(--txt3)}

/* ── DELIVERABLES ── */
.delg{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:8px}
.deli{display:flex;align-items:flex-start;gap:.6rem;
  background:var(--card);border-radius:8px;padding:.65rem .8rem;
  border-left:2px solid var(--green)}
.deln{font-family:'Syne',sans-serif;font-size:15px;font-weight:700;color:var(--green);flex-shrink:0;width:1.4rem}
.delt h5{font-family:'Syne',sans-serif;font-size:11px;font-weight:700;color:var(--txt)}
.delt p{font-size:10px;color:var(--txt3);margin-top:2px}

/* ── HOME LAYOUT ── */
.home-layout{display:grid;grid-template-columns:1fr 1fr;gap:2rem;align-items:center;min-height:60vh}
.home-img{display:flex;justify-content:center;align-items:center}
@media(max-width:700px){
  .home-layout{grid-template-columns:1fr;gap:1.2rem}
  .home-img{order:-1;max-width:280px;margin:0 auto}
}

/* ── RUBRIC ── */
.rubw{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:11px;min-width:500px}
th{background:var(--bg2);padding:.5rem .75rem;font-family:'Syne',sans-serif;font-size:10px;
  font-weight:700;text-align:left;color:var(--txt2);border-bottom:1px solid var(--bdr)}
td{padding:.5rem .75rem;border-bottom:1px solid var(--bdr);vertical-align:top;color:var(--txt2)}
td:first-child{font-family:'Syne',sans-serif;font-weight:700;color:var(--gold);width:19%}
td.ex{color:var(--green)}td.sc{text-align:center;font-weight:700;color:var(--txt3);width:3.5rem}

/* ── SHOWCASE ── */
.show{background:var(--card);border-radius:10px;border:1px solid var(--bdr);overflow:hidden}
.str{display:grid;grid-template-columns:110px 1fr;gap:1rem;
  padding:.75rem .95rem;border-bottom:1px solid var(--bdr)}
.str:last-child{border-bottom:none}
.stt{font-family:'Syne',sans-serif;font-size:11px;font-weight:700;color:var(--gold)}
.sta h4{font-family:'Syne',sans-serif;font-size:12px;font-weight:700;color:var(--txt);margin-bottom:.15rem}
.sta p{font-size:11px;color:var(--txt2);line-height:1.5}

/* ── GROUPS ── */
.gg{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:6px}
.gc{background:var(--card);border:1px solid var(--bdr);border-radius:8px;
  padding:.6rem .8rem;display:flex;align-items:center;gap:.5rem;transition:background .15s}
.gc:hover{background:var(--bg3)}
.gn{font-family:'Syne',sans-serif;font-size:10px;font-weight:700;color:var(--gold);
  background:var(--gold-bg);border-radius:4px;
  width:22px;height:22px;display:flex;align-items:center;justify-content:center;flex-shrink:0}

/* ── STEPS ── */
.steps{display:flex;flex-direction:column;gap:7px;margin-top:1rem}
.step{display:flex;gap:.7rem;background:var(--card);border-radius:10px;
  padding:.85rem .95rem;border:1px solid var(--bdr)}
.snum{font-family:'Syne',sans-serif;font-size:18px;font-weight:700;color:var(--gold);flex-shrink:0;line-height:1.1}
.step h4{font-family:'Syne',sans-serif;font-size:12px;font-weight:700;color:var(--txt);margin-bottom:.15rem}
.step p{font-size:11px;color:var(--txt2);line-height:1.5}

/* ── REFS ── */
.refs{list-style:none;display:flex;flex-direction:column;gap:.65rem}
.refs li{padding:.7rem .9rem;background:var(--card);border-left:2px solid var(--blue);
  border-radius:0 8px 8px 0;font-size:11px;line-height:1.65;color:var(--txt2)}
.refs li a{color:var(--blue)}.refs li a:hover{text-decoration:underline}

/* ── MOBILE RESPONSIVE ── */
@media(max-width:600px){
  .topbar{padding:.4rem .8rem}
  .brand{font-size:10px;max-width:140px;overflow:hidden;white-space:nowrap;text-overflow:ellipsis}
  .lb{padding:3px 6px;font-size:10px}
  .nav{top:36px;padding:.25rem .5rem}
  .sn{font-size:10px;padding:3px 7px}
  .page{padding:1.2rem .85rem 2.5rem}
  .hero-h{font-size:clamp(26px,10vw,42px)}
  .hero-s{font-size:13px}
  .pills{gap:.35rem}
  .pill{padding:4px 9px;font-size:11px}
  .pill strong{font-size:13px}
  h2{font-size:18px}
  .intro{font-size:12px}
  .g2{grid-template-columns:1fr 1fr}
  .g3{grid-template-columns:1fr}
  .g2x{grid-template-columns:1fr}
  .tl .tlr{grid-template-columns:72px 1px 1fr;gap:0 8px}
  .tld{font-size:10px}
  .tlb h4{font-size:11px}
  .tlb p{font-size:10px}
  .tags{gap:3px}
  .tag{font-size:9px;padding:2px 5px}
  .rgrid,.roles-grid{grid-template-columns:1fr 1fr}
  .strow,.str{grid-template-columns:90px 1fr;gap:.7rem}
  .stt,.sttime{font-size:10px}
  .sta h4,.stact h4{font-size:11px}
  .sta p,.stact p{font-size:11px}
  .gg{grid-template-columns:1fr 1fr}
  .qlg{grid-template-columns:repeat(3,1fr)}
  .delg{grid-template-columns:1fr}
  .rubw{font-size:10px}
  table{min-width:420px}
  th{font-size:9px;padding:.4rem .55rem}
  td{padding:.4rem .55rem;font-size:10px}
  .mbox{font-size:12px;padding:.8rem .9rem}
  .tasklist li{font-size:11px;padding:.45rem .65rem}
  .step{padding:.75rem .85rem}
  .snum{font-size:16px}
  .step h4{font-size:11px}
  .step p{font-size:10px}
  .refs li{font-size:10px;padding:.6rem .75rem}
  .card{padding:.85rem}
  .card p,.card h4{font-size:11px}
  .gtcard{padding:1rem}
  .gtcard h3{font-size:12px}
  .gtcard p{font-size:11px}
  .thbox{padding:1rem}
  .thbox h3{font-size:11px}
  .thbox li{font-size:11px}
  .tcat{font-size:10px}
  .tlinks{font-size:11px}
  .tdesc{font-size:10px}
  .deln{font-size:13px}
  .delt h5{font-size:11px}
  .delt p{font-size:10px}
  .qn{font-size:10px}
  .qd{font-size:9px}
  .qi{font-size:18px}
}
@media(max-width:380px){
  .g2{grid-template-columns:1fr}
  .gg{grid-template-columns:1fr}
  .qlg{grid-template-columns:repeat(2,1fr)}
  .rgrid{grid-template-columns:1fr}
}
.mbox{background:var(--green-bg);border:1px solid var(--green-bdr);border-radius:10px;
  padding:.95rem 1.1rem;margin-bottom:1.1rem;font-size:13px;line-height:1.7;color:var(--txt)}
.mbox strong{color:var(--green);font-weight:600}
.tasklist{list-style:none;display:flex;flex-direction:column;gap:5px}
.tasklist li{display:flex;align-items:flex-start;gap:.55rem;
  padding:.55rem .75rem;background:var(--card);border:1px solid var(--bdr);
  border-left:2px solid var(--gold);border-radius:0 8px 8px 0;
  font-size:12px;color:var(--txt);line-height:1.5}
.tasklist li::before{content:'→';color:var(--gold);flex-shrink:0;font-weight:600}
</style>
</head>
<body class="light">

<div class="topbar">

</div>

<nav class="nav" id="nav"></nav>

<div id="pages">

function toggleMode(){
  MODE=MODE==='light'?'dark':'light';
  document.body.className=MODE;
  document.getElementById('mb').textContent=MODE==='light'?'🌙':'☀️';
}

function go(id){
  document.querySelectorAll('.page').forEach(function(p){p.classList.remove('on')});
  document.querySelectorAll('.sn').forEach(function(b){b.classList.remove('on')});
  var pg=document.getElementById('p-'+id);
  var btn=document.getElementById('sn-'+id);
  if(pg){pg.classList.add('on');pg.scrollIntoView({behavior:'smooth',block:'start'})}
  if(btn)btn.classList.add('on');
}

function buildNav(){
  var n=document.getElementById('nav');n.innerHTML='';
  NAV.forEach(function(item){
    var b=document.createElement('button');
    b.className='sn';b.id='sn-'+item.id;
    b.textContent=item[L]||item.en;
    b.onclick=(function(id){return function(){go(id)}})(item.id);
    n.appendChild(b);
  });
}

function render(){
  /* tasks */
  document.getElementById('tlist').innerHTML=TASKS.map(function(t){return'<li>'+t[L]+'</li>'}).join('');
  /* ideas */
  document.getElementById('ideas-grid').innerHTML=IDEAS.map(function(i){return'<div class="card"><div class="ci">'+i.ci+'</div><h4>'+i[L+'_t']+'</h4><p>'+i[L]+'</p></div>'}).join('');
  /* quality */
  document.getElementById('quality-grid').innerHTML=QUALITY.map(function(q){return'<div class="card"><div class="ci">'+q.ci+'</div><h4>'+q[L]+'</h4><p>'+q[L+'_d']+'</p></div>'}).join('');
  /* types */
  document.getElementById('types-grid').innerHTML=TYPES.map(function(t){return'<div class="gtcard '+t.cls+'"><div class="gti">'+t.gi+'</div><h3>'+t[L]+'</h3><p>'+t[L+'_d']+'</p><div class="eg">'+t[L+'_e']+'</div></div>'}).join('');
  /* themes */
  document.getElementById('sdg-list').innerHTML=SDG_LIST.map(function(s){return'<li>'+s[L]+'</li>'}).join('');
  document.getElementById('hls-list').innerHTML=HLS_LIST.map(function(s){return'<li>'+s[L]+'</li>'}).join('');
  /* timeline */
  document.getElementById('tl-wrap').innerHTML=TIMELINE.map(function(t){
    return'<div class="tlr"><div class="tld">'+t.date+'</div><div class="tll"><div class="dot"></div><div class="conn"></div></div><div class="tlb"><h4>'+t[L]+'</h4><p>'+t[L+'_d']+'</p><div class="tags">'+t[L+'_t'].map(function(tg){return'<span class="tag">'+tg+'</span>'}).join('')+'</div></div></div>'}).join('');
  /* roles */
  document.getElementById('roles-grid').innerHTML=ROLES.map(function(r){
    return'<div class="rcard"><div class="rhd"><span>'+r.ri+'</span><h4>'+r[L]+'</h4></div><ul class="rb">'+r.items.map(function(i){return'<li>'+i[L]+'</li>'}).join('')+'</ul></div>'}).join('');
  /* tools */
  document.getElementById('tools-grid').innerHTML=TOOLS.map(function(t){
    var lnks=t.links.map(function(l){return'<a href="'+l.u+'" target="_blank">'+l.t+'</a>'}).join(' · ');
    if(t.extra)lnks+=(lnks?' · ':'')+t.extra;
    return'<div class="tcard"><div class="tcat">'+t.cat+' '+t[L]+'</div><div class="tlinks">'+lnks+'</div><div class="tdesc">'+t[L+'_d']+'</div></div>'}).join('');
  /* quick links */
  document.getElementById('ql-grid').innerHTML=QLINKS.map(function(q){
    return'<a class="qlc" href="'+q.u+'" target="_blank"><span class="qi">'+q.qi+'</span><span class="qn">'+q.qn+'</span><span class="qd">'+q[L]+'</span></a>'}).join('');
  /* deliverables */
  document.getElementById('del-grid').innerHTML=DELIVER.map(function(d){
    return'<div class="deli"><span class="deln">'+d.n+'</span><div class="delt"><h5>'+d[L]+'</h5><p>'+d[L+'_d']+'</p></div></div>'}).join('');
  /* rubric */
  var hd=(L==='en'?['Criteria','Excellent (5)','Good (3)','Needs Work (1)']:L==='no'?['Kriterium','Fremragende (5)','Bra (3)','Trenger arbeid (1)']:['Критерій','Відмінно (5)','Добре (3)','Потрібна робота (1)']);
  document.getElementById('rub').innerHTML='<thead><tr>'+hd.map(function(h){return'<th>'+h+'</th>'}).join('')+'<th>/5</th></tr></thead><tbody>'+RUBRIC.map(function(r){return'<tr><td>'+r[L]+'</td><td class="ex">'+r[L+'_e']+'</td><td>'+r[L+'_g']+'</td><td style="color:var(--txt3)">'+r[L+'_n']+'</td><td class="sc">__/5</td></tr>'}).join('')+'</tbody>';
  /* showcase */
  document.getElementById('show-box').innerHTML=SHOWCASE.map(function(s){return'<div class="str"><div class="stt">'+s.time+'</div><div class="sta"><h4>'+s[L]+'</h4><p>'+s[L+'_d']+'</p></div></div>'}).join('');
  /* groups */
  document.getElementById('gg').innerHTML=GROUPS.map(function(g,i){return'<div class="gc"><span class="gn">'+(i+1)+'</span><span style="font-size:12px;color:var(--txt)">'+g+'</span></div>'}).join('');
  /* steps */
  document.getElementById('steps').innerHTML=STEPS.map(function(s,i){return'<div class="step"><span class="snum">'+(i+1)+'</span><div><h4>'+s[L]+'</h4><p>'+s[L+'_d']+'</p></div></div>'}).join('');
  /* refs */
  document.getElementById('refs').innerHTML=REFS.map(function(r){return'<li>'+r.txt+' <a href="'+r.url+'" target="_blank">'+r.link+'</a></li>'}).join('');
  /* .t elements */
  document.querySelectorAll('.t').forEach(function(el){var v=el.getAttribute('data-'+L);if(v!==null)el.innerHTML=v;});
  /* nav labels */
  document.querySelectorAll('.sn').forEach(function(b){var id=b.id.replace('sn-','');var n=NAV.find(function(x){return x.id===id});if(n)b.textContent=n[L]||n.en;});
}

function setL(lang){
  L=lang;
  document.querySelectorAll('.lb').forEach(function(b){b.classList.remove('on')});
  var ob=document.querySelector('.lb[onclick="setL(\''+lang+'\')"]');
  if(ob)ob.classList.add('on');
  render();
}

buildNav();
render();
go('home');
